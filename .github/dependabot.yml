version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "monthly"
    groups:
      action-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "nuget"
    directory: "/CustomQuizHost.Server"
    cooldown:
      default-days: 7
    schedule:
      interval: "quarterly"
    groups:
      nuget-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
          
  - package-ecosystem: "npm"
    directory: "/customquizhost.client"
    cooldown:
      default-days: 7
    schedule:
      interval: "quarterly"
    groups:
      npm-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"